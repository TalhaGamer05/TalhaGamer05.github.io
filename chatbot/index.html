<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sohbet botu</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-pencere">
        <div class="chat-baslik">
            <div class="bot-avatar">🤖</div>
            <div>
                <h2>t4lhBot</h2>
                <span class="durum">çevrimiçi</span>
            </div>
            <button class="tema-btn" id="temaBtn" onclick="temaDegistir()">🌙</button>
        </div>

        <div class="mesajlar" id="mesajlar">
            <!-- mesajlar buraya eklenir -->
        </div>

        <div class="yaziyor" id="yaziyor" style="display:none">
            <div class="bot-avatar kucuk">🤖</div>
            <div class="noktalar"><span></span><span></span><span></span></div>
        </div>

        <form class="mesaj-girdi" id="mesajForm">
            <input type="text" id="mesajInput" placeholder="bir şeyler yaz..." autocomplete="off">
            <button type="submit">gönder</button>
        </form>
    </div>

    <script src="chat.js"></script>
</body>
</html>
