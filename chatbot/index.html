<!DOCTYPE html>

    <a href="../index.html" style="position:fixed;top:12px;left:12px;z-index:9999;background:rgba(0,0,0,0.6);color:#ccc;text-decoration:none;padding:7px 14px;border-radius:8px;font-size:0.8rem;backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,0.08);font-family:sans-serif">← ana sayfa</a>

            <div>

        <form class="mesaj-girdi" id="mesajForm">
