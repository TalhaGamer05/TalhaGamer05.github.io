    <link rel="stylesheet" href="style.css">
    
    <style>
        .floating-map-container {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 350px;
            height: 250px;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 8px 32px 0 rgba(0,0,0,0.37);
            z-index: 8000;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        @media (max-width: 768px) {
            .floating-map-container {
                width: calc(100% - 40px);
                bottom: 80px; 
                height: 200px;
            }
        }
    </style>
</head>

<body>
    <!-- Arka Plan Videosu -->
    <video autoplay loop muted id="bg-video" class="bg-video">
        <source id="bg-video-source" src="videolar/gunesli.mp4" type="video/mp4">
    </video>

    <!-- Atmosferik Çevresel Ses (Ambient Audio) -->
    <audio id="ambient-audio" loop></audio>

    <!-- Navigasyon Menüsü -->
    <nav class="main-nav">
        <ul>
            <li><a href="index.html" class="active">Ana Sayfa</a></li>

    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
    <div class="sidebar-trigger" id="sidebarTrigger"></div>

    <header id="sidebar">
        <h1>Hava Durumu</h1>

        <form id="searchForm" class="search-form">
            <input type="text" id="searchInput" class="search-input" placeholder="Şehir ara..." required>
            <button type="submit" class="search-button">Ara</button>
        </form>

        <div style="display:flex; gap:10px; margin-top:5px;">
            <button id="luckyBtn" class="lucky-btn" style="flex:1;" onclick="feelingLucky()">Şanslı Tahmin</button>
            <button id="mapToggleBtn" class="lucky-btn" style="flex:1; background: #8b5cf6;" onclick="toggleMap()">🌍 Harita</button>
        </div>

        <div class="city-selector" id="citySelector"></div>
    </header>

    <!-- Floating Map Container (Moved from sidebar) -->
    <div id="mapContainer" class="floating-map-container" style="display: none;"></div>

    <main>
        <section id="weatherContainer"></section>
    </main>

    <!-- Antigravity Tetikleyici Buton -->
    <button id="antigravityBtn" class="antigravity-trigger">Yerçekimi Aç/Kapat</button>

    <footer class="main-footer">

        const sidebarTrigger = document.getElementById('sidebarTrigger');
        const sidebarBackdrop = document.getElementById('sidebarBackdrop');

        function closeSidebar() {
            sidebar.classList.remove('visible');
            sidebarBackdrop.classList.remove('visible');
        }

        function openSidebar() {
            sidebar.classList.add('visible');
            sidebarBackdrop.classList.add('visible');
        }

        sidebarTrigger.addEventListener('click', openSidebar);
        sidebarTrigger.addEventListener('mouseenter', openSidebar);
        sidebar.addEventListener('mouseleave', (e) => {
            const mapContainer = document.getElementById('mapContainer');
            if (mapContainer && mapContainer.style.display === 'block') return; // Harita açıksa menü kapanmasın
            closeSidebar();
        });
        sidebarBackdrop.addEventListener('click', closeSidebar);

        // Arama Formu İşlemi
        document.getElementById('searchForm').addEventListener('submit', function (e) {
            e.preventDefault();
            let searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
            const charMap = { 'ı': 'i', 'ğ': 'g', 'ü': 'u', 'ş': 's', 'ö': 'o', 'ç': 'c' };
            searchTerm = searchTerm.replace(/[ığüşöç]/g, match => charMap[match]);

            if (citiesWeatherData[searchTerm]) {
                const targetButton = document.querySelector(`.city-btn[data-city="${searchTerm}"]`);
                loadWeather(searchTerm, targetButton);
                closeSidebar();
            } else {
                alert("Şehir bulunamadı! Lütfen kayıtlı şehirleri deneyin (Örn: Gönen, Bandırma, Londra).");
            }
            document.getElementById('searchInput').value = '';
        });

        function feelingLucky() {
            const keys = Object.keys(citiesWeatherData);
            if (keys.length === 0) return;
            const randomKey = keys[Math.floor(Math.random() * keys.length)];
            const btn = document.querySelector(`.city-btn[data-city="${randomKey}"]`);
            if (btn) btn.click();
        }

        function createCityButtons() {
            const selector = document.getElementById('citySelector');
            const sortedKeys = Object.keys(citiesWeatherData).sort((a,b) => citiesWeatherData[a].city.localeCompare(citiesWeatherData[b].city, 'tr'));
            sortedKeys.forEach((key, index) => {
                const btn = document.createElement('button');
                btn.className = 'city-btn';
                btn.textContent = citiesWeatherData[key].city;
                btn.dataset.city = key;
                btn.onclick = () => {
                    loadWeather(key, btn);
                    closeSidebar();
                };
                selector.appendChild(btn);
                if (index === 0) btn.click();
            });
        }

        // Arka Plan Videosunu ve Sesini Değiştiren DOM Fonksiyonu
        let isSoundEnabled = false;

        function toggleAmbientSound() {
            const audio = document.getElementById('ambient-audio');
            const btn = document.getElementById('soundToggleBtn');
            isSoundEnabled = !isSoundEnabled;
            
            if (isSoundEnabled) {
                audio.play().catch(e => console.log("Otomatik ses oynatma engellendi."));
                btn.innerHTML = "🔊 Ses: Açık";
                btn.classList.add("active");
            } else {
                audio.pause();
                btn.innerHTML = "🔇 Ses: Kapalı";
                btn.classList.remove("active");
            }
        }

        function updateBackgroundVideo(condition) {
            const videoElement = document.getElementById('bg-video');
            const sourceElement = document.getElementById('bg-video-source');
            const audioElement = document.getElementById('ambient-audio');

            let targetVideo = 'videolar/gunesli.mp4';
            let targetAudio = 'https://upload.wikimedia.org/wikipedia/commons/2/23/Birds_in_spring.ogg'; // Default sunny chill wind

            const condLower = condition.toLowerCase();

            // Hava durumuna göre video ve ses ataması
            if (condLower.includes('yağmur')) {
                targetVideo = 'videolar/yagmur.mp4';
                targetAudio = 'https://upload.wikimedia.org/wikipedia/commons/5/52/Rain_1.ogg'; // Rain sound
            } else if (condLower.includes('bulut')) {
                targetVideo = 'videolar/bulutlu.mp4';
                targetAudio = 'https://upload.wikimedia.org/wikipedia/commons/9/9f/Wind_howling.ogg'; // Cloudy/Wind
            } else if (condLower.includes('kar')) {
                targetVideo = 'videolar/karli.mp4';
                targetAudio = 'https://upload.wikimedia.org/wikipedia/commons/9/9f/Wind_howling.ogg'; // Snow/Cold wind
            } else if (condLower.includes('güneş') || condLower.includes('açık')) {
                targetVideo = 'videolar/gunesli.mp4';
                targetAudio = 'https://upload.wikimedia.org/wikipedia/commons/2/23/Birds_in_spring.ogg'; // Birds/Sunny
            } else if (condLower.includes('fırtına')) {
                targetVideo = 'videolar/firtinali.mp4';
                targetAudio = 'https://upload.wikimedia.org/wikipedia/commons/f/ff/Thunder_and_lightning.ogg'; // Thunderstorm
            }

            // Video Kaynak Kontrolü
            if (!sourceElement.src.endsWith(targetVideo)) {
                sourceElement.src = targetVideo;
                videoElement.load(); 
                videoElement.play(); 
            }

            // Ses Kaynak Kontrolü (Pixabay veya dış public API streaming)
            if (audioElement.src !== targetAudio) {
                audioElement.src = targetAudio;
                audioElement.load();
                if (isSoundEnabled) {
                    audioElement.play().catch(e => console.log('Oynatma reddedildi:', e));
                }
            }
        }

        async function loadWeather(cityKey, button) {
            document.querySelectorAll('.city-btn').forEach(btn => btn.classList.remove('active'));
            if (button) button.classList.add('active');

            // --- Gerçekçi Sınıf-A Atlama (Level-Up) Özelliği: Async Loader (Skeleton) ---
            const container = document.getElementById('weatherContainer');
            container.innerHTML = `
                <div class="weather-dashboard skeleton-active">
                    <div class="skeleton-header">
                        <div class="skeleton-shimmer skeleton-circle"></div>
                        <div class="skeleton-shimmer skeleton-text title"></div>
                        <div class="skeleton-shimmer skeleton-text huge"></div>
                        <div class="skeleton-shimmer skeleton-text sub"></div>
                    </div>
                </div>
            `;

            // Veritabanı gecikmesini (Fake API süresini) asenkron simülasyonla bekle
            await new Promise(resolve => setTimeout(resolve, 600));

            const weatherData = citiesWeatherData[cityKey];
            generateDashboard(weatherData);

            // Video ve Ses fonksiyonunu burada tetikliyoruz
            updateBackgroundVideo(weatherData.condition);
        }

        function toggleMap() {

                if (!mapInitialized) {
                    map = L.map('mapContainer', {
                        zoomControl: false // Sidebar kısıtlı alan olduğu için default zoom kontrolünü kapatıyoruz
                    }).setView([39.0, 35.0], 5);

                    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                        attribution: '&copy; <a href="https://carto.com/">CartoDB</a>',

                    }).addTo(map);

                        if (cityCoordinates[cityKey]) {

                            const marker = L.circleMarker(coord, {

                                radius: 6,
                                fillOpacity: 0.8,
                                weight: 2
                            }).addTo(map);
                            
                            marker.bindPopup(`<b>${citiesWeatherData[cityKey].city}</b>`, { closeButton: false });
                            
                            marker.on('mouseover', function(e) { this.openPopup(); });

        let isGravityOn = false;

        document.getElementById('antigravityBtn').addEventListener('click', function() {
            if (isGravityOn) return; // Sadece bir kere başlat
            isGravityOn = true;
            this.style.display = 'none';
            // Arka planı derin uzaya çevir (Devasa Güneş Sistemi Görseli)
            const bgVideo = document.getElementById('bg-video');
            if (bgVideo) {
                bgVideo.style.transition = "opacity 2s ease";
                bgVideo.style.opacity = "0"; // Videoyu yavaşça gizle
            }
            
            const spaceBg = document.createElement('div');
            spaceBg.style.position = 'fixed';
            spaceBg.style.top = '0';
            spaceBg.style.left = '0';
            spaceBg.style.width = '100vw';
            spaceBg.style.height = '100vh';
            spaceBg.style.zIndex = '2'; // Video'nun (0) üstünde, uçan UI panellerinin (9999) altında kalacak!
            spaceBg.style.backgroundImage = "url('https://images.unsplash.com/photo-1462331940025-496dfbfc7564?q=80&w=2000&auto=format&fit=crop')"; // Çok şık bir uzay/gözlem/galaksi haritası
            spaceBg.style.backgroundSize = "cover";
            spaceBg.style.backgroundPosition = "center";
            spaceBg.style.opacity = '0';
            spaceBg.style.transition = 'opacity 2s ease';
            spaceBg.style.pointerEvents = 'none'; // Tıklamaları engellemesin
            document.body.appendChild(spaceBg);

            setTimeout(() => {
                spaceBg.style.opacity = '1';
            }, 100);

            // Matter.js modülleri
            const Engine = Matter.Engine,
                  Render = Matter.Render,
                  Runner = Matter.Runner,
                  Bodies = Matter.Bodies,
                  Composite = Matter.Composite,
                  Mouse = Matter.Mouse,
                  MouseConstraint = Matter.MouseConstraint;

            // Motor oluştur
            engine = Engine.create();
            engine.world.gravity.y = 0; // Sıfır yerçekimi (uzay boşluğu)
            engine.world.gravity.x = 0;
            engine.timing.timeScale = 1.0; // Akıcı hareket etmesi için donukluğu sildim, gerçekçi bir akış hızı
            engine.enableSleeping = false; // Belli bir süre sonra algılayıp uyku moduna (donmaya) geçmelerini tamemen engelle

            // Görünmez canvas oluştur
            const render = Render.create({
                element: document.body,
                engine: engine,
                options: {
                    width: window.innerWidth,
                    height: window.innerHeight,
                    wireframes: false,
                    background: 'transparent'
                }
            });

            // Ekran sınırlarını (duvarları) oluştur
            const wallOptions = { isStatic: true, render: { visible: false } };
            const ground = Bodies.rectangle(window.innerWidth / 2, window.innerHeight + 50, window.innerWidth, 100, wallOptions);
            const leftWall = Bodies.rectangle(-50, window.innerHeight / 2, 100, window.innerHeight, wallOptions);
            const rightWall = Bodies.rectangle(window.innerWidth + 50, window.innerHeight / 2, 100, window.innerHeight, wallOptions);
            const roof = Bodies.rectangle(window.innerWidth / 2, -50, window.innerWidth, 100, wallOptions);
            Composite.add(engine.world, [ground, leftWall, rightWall, roof]);

            // Düşmesini istediğimiz HTML elementleri a
            const selectors = [
                '.weather-dashboard', 
                '.main-nav',
                '#sidebar'
            ];

            const bodies = [];

            selectors.forEach(selector => {
                const elements = document.querySelectorAll(selector);
                elements.forEach(el => {
                    const rect = el.getBoundingClientRect();
                    if (rect.width === 0 || rect.height === 0) return;

                    // Animasyon çakışmasını durdur! Yoksa CSS transformu Matter js koordinatlarını bozar (Bu yüzden konum ve boyut bozuluyordu)
                    el.style.animation = 'none';
                    el.style.transition = 'none';

                    // Elementin mevcut stilini sabitle (Kaymayı/Jump'ı önlemek için left, top değerlerini de veriyoruz)
                    el.style.left = rect.left + 'px';
                    el.style.top = rect.top + 'px';
                    el.style.width = rect.width + 'px';
                    el.style.height = rect.height + 'px';
                    el.style.position = 'fixed'; // Absolute yerine fixed olması scroll esnasında da bozulmayı önler
                    el.style.margin = '0';
                    el.style.transformOrigin = '50% 50%';
                    el.style.zIndex = '9999'; // Objeler arkada kalmasın
                    
                    // Box için X, Y hesapla (matter.js merkezi referans alır)
                    const x = rect.left + (rect.width / 2);
                    const y = rect.top + (rect.height / 2);

                    // Rigid Body oluştur
                    const body = Bodies.rectangle(x, y, rect.width, rect.height, {
                        restitution: 0.8, // Duvara çarpınca yavaşça seker
                        friction: 0.0,
                        frictionAir: 0.0, // Sıfır sürtünme: Objeler UZAYDA ASLA DURMAZ! Sonsuza dek süzülür.
                        render: { visible: false } // Görselleştirme matter üzerinden değil DOM üzerinden olacak
                    });

                    // Body'ye HTML elementini bağla
                    body.plugin = { htmlElement: el };
                    bodies.push(body);
                    Composite.add(engine.world, body);

                    // Fırlatış (Gerçek uzaydaki gibi sabit sürüklenme)
                    Matter.Body.applyForce(body, body.position, {
                        x: (Math.random() - 0.5) * 0.005 * body.mass,
                        y: (Math.random() - 0.5) * 0.005 * body.mass
                    });
                    Matter.Body.setAngularVelocity(body, (Math.random() - 0.5) * 0.02);
                });
            });

            // Motoru çalıştır
            Runner.run(Runner.create(), engine);

            // Her frame'de (güncellemede) DOM elementlerinin pozisyonunu güncelle
            Matter.Events.on(engine, 'afterUpdate', function() {
                bodies.forEach(body => {
                    const el = body.plugin.htmlElement;
                    // Matter.js pos -> DOM pos transformasyonu (merkezli hesaplama)
                    const x = body.position.x - (el.offsetWidth / 2);
                    const y = body.position.y - (el.offsetHeight / 2);
                    const angle = body.angle;

                    el.style.left = x + 'px';
                    el.style.top = y + 'px';
                    el.style.transform = "rotate(" + angle + "rad)";
                    // Webgl çalışıyorsa canvas resize işini bozmasın diye ek kontrol
                    el.style.width = el.offsetWidth + 'px';
                    el.style.height = el.offsetHeight + 'px'; 
                });
            });

            // Fare (Mouse) etkileşimi ekle
            const mouse = Mouse.create(document.body);
            const mouseConstraint = MouseConstraint.create(engine, {
                mouse: mouse,
                constraint: {
                    stiffness: 0.2,
                    render: { visible: false }
                }
            });
            Composite.add(engine.world, mouseConstraint);
            render.mouse = mouse;
            
            // MatterJS Canvas'ı css ile görünmez yap ama pointer-events geçişine izin ver
            render.canvas.style.position = 'absolute';
            render.canvas.style.top = '0';
            render.canvas.style.left = '0';
            render.canvas.style.pointerEvents = 'none'; // DOM'a tıklanabilsin (mouse kısıtlaması arkada)
        });

        // ==========================================
        // SERVICE WORKER KAYDI (PWA İÇİN)
        // ==========================================
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then((registration) => {
                    console.log('ServiceWorker kayıt başarılı: ', registration.scope);
                }, (err) => {
                    console.log('ServiceWorker kayıt başarısız: ', err);
                });
            });
        }
    </script>
</body>

</html>
