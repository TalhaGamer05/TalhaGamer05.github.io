<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Güvenli Ödeme - AvMarket</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="satinal.css">
</head>
<body>

    <video autoplay loop muted playsinline id="odeme-arka-plan-video">
        <source src="resimler/doga_videosu.mp4" type="video/mp4">
    </video>

    <div class="odeme-kapsayici">
        <a href="index.html" class="geri-don-linki">← Alışverişe Dön</a>
        <h1>🛡️ Güvenli Ödeme</h1>

        <div class="kart-ikonlari">
            💳 🏦
        </div>
        
        <form id="odeme-formu">
            <div class="form-grubu">
                <label>Ad Soyad</label>
                <input type="text" placeholder="Örn: Avcı Mehmet" required>
            </div>

            <div class="form-grubu">
                <label>E-posta Adresi</label>
                <input type="email" placeholder="ornek@mail.com" required>
            </div>

            <div class="form-grubu">
                <label>Teslimat Adresi</label>
                <textarea placeholder="Açık adresinizi giriniz..." required></textarea>
            </div>

            <hr style="border: 0; border-top: 1px dashed rgba(212, 175, 55, 0.4); margin: 30px 0;">

            <div class="form-grubu">
                <label>Kart Üzerindeki İsim</label>
                <input type="text" placeholder="Ad Soyad" required>
            </div>

            <div class="form-grubu">
                <label>Kart Numarası</label>
                <input type="text" placeholder="0000 0000 0000 0000" maxlength="19" required>
            </div>

            <div class="form-satiri">
                <div class="form-grubu">
                    <label>Son Kullanma (Ay/Yıl)</label>
                    <input type="text" placeholder="AA/YY" maxlength="5" required>
                </div>
                <div class="form-grubu">
                    <label>CVV (Güvenlik Kodu)</label>
                    <input type="text" placeholder="123" maxlength="3" required>
                </div>
            </div>

            <button type="submit" class="onay-butonu">Siparişi Onayla ve Satın Al</button>
        </form>
    </div>

    <script>
        document.getElementById('odeme-formu').addEventListener('submit', function(olay) {
            olay.preventDefault(); // Sayfanın anında yenilenmesini engeller
            
            // Satın alma efekti
            const buton = document.querySelector('.onay-butonu');
            buton.style.background = '#2d5016';
            buton.style.color = '#fff';
            buton.innerText = '⏳ İşleniyor...';

            setTimeout(() => {
                alert("🎉 Siparişiniz başarıyla alındı! Avınız kanlı olsun.");
                // Sipariş tamamlanınca sepeti boşaltıyoruz (Profesyonel dokunuş)
                localStorage.removeItem('sepetVerisi'); 
                window.location.href = "index.html"; // Tamamlanınca ana sayfaya atar
            }, 1500); // 1.5 saniye bekleme efekti
        });
    </script>
</body>
</html>
